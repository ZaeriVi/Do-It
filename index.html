  /* ---------- Export / Import ---------- */
  function handleExport() {
    const payload = {
      app: 'Do It',
      version: 1,
      exportedAt: new Date().toISOString(),
      tasks: state.tasks,
      workspaces: state.workspaces,
      timeLog: state.timeLog
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `do-it-backup-${toISODate(new Date())}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Backup downloaded');
    closeSettingsPopover();
  }

  function handleImportClick() {
    importFileInput.click();
  }

  async function handleImportFile(e) {
    const file = e.target.files && e.target.files[0];
    importFileInput.value = '';
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data.tasks) || !Array.isArray(data.workspaces)) {
        throw new Error('Malformed backup file');
      }
      const ok = await openModal({
        title: 'Import backup?',
        message: `This replaces everything currently saved with the ${data.tasks.length} task(s) and ${data.workspaces.length} workspace(s) from this file. This can't be undone.`,
        confirmLabel: 'Replace and import',
        danger: true
      });
      if (!ok) return;
      localStorage.setItem(STORAGE.TASKS, JSON.stringify(data.tasks));
      localStorage.setItem(STORAGE.WORKSPACES, JSON.stringify(data.workspaces));
      if (Array.isArray(data.timeLog)) localStorage.setItem(STORAGE.TIMELOG, JSON.stringify(data.timeLog));
      state.tasks = loadTasks();
      state.workspaces = loadWorkspaces();
      state.timeLog = loadTimeLog();
      saveTasks();
      saveWorkspaces();
      saveTimeLog();
      state.currentWorkspace = state.workspaces[0].name;
      state.focusMode = false;
      render();
      playSound('add');
      showToast('Backup imported');
      closeSettingsPopover();
    } catch (err) {
      playSound('error');
      showToast("That file couldn't be imported");
    }
  }

  /* ---------- Stats ---------- */
  function isSameDay(a, b) {
    return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
  }

  function computeStats() {
    const now = new Date();
    const today = toISODate(now);
    const weekAgo = new Date(now); weekAgo.setDate(weekAgo.getDate() - 6); weekAgo.setHours(0, 0, 0, 0);

    const timeToday = (state.timeLog.find(e => e.date === today) || { seconds: 0 }).seconds;
    const timeWeek = state.timeLog.filter(e => {
      const d = parseLocalDate(e.date);
      return d && d >= weekAgo;
    }).reduce((sum, e) => sum + e.seconds, 0);

    const completedToday = state.tasks.filter(t => t.completedAt && isSameDay(new Date(t.completedAt), now)).length;
    const completedWeek = state.tasks.filter(t => t.completedAt && new Date(t.completedAt) >= weekAgo).length;

    const completionDays = new Set(state.tasks.filter(t => t.completedAt).map(t => toISODate(new Date(t.completedAt))));
    let streak = 0;
    let cursor = new Date(now);
    if (!completionDays.has(toISODate(cursor))) cursor.setDate(cursor.getDate() - 1);
    while (completionDays.has(toISODate(cursor))) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }

    const totalTasks = state.tasks.length;
    const totalCompleted = state.tasks.filter(t => t.completed).length;

    return { timeToday, timeWeek, completedToday, completedWeek, streak, totalTasks, totalCompleted };
  }

  function renderStats() {
    const s = computeStats();
    const tiles = [
      [formatHoursMinutes(s.timeToday), 'Tracked today'],
      [formatHoursMinutes(s.timeWeek), 'Tracked this week'],
      [String(s.completedToday), 'Completed today'],
      [String(s.completedWeek), 'Completed this week'],
      [String(s.streak), s.streak === 1 ? 'Day streak' : 'Day streak'],
      [`${s.totalCompleted}/${s.totalTasks}`, 'All-time completed']
    ];
    statsGridEl.innerHTML = tiles.map(([value, label]) =>
      `<div class="stat-tile"><span class="stat-value">${escapeHtml(value)}</span><span class="stat-label">${escapeHtml(label)}</span></div>`
    ).join('');
  }

  /* ---------- Timer / stopwatch ---------- */
  function getElapsedSeconds(taskId) {
    const id = taskId || timerState.taskId;
    if (!id) return 0;
    const task = state.tasks.find(t => t.id === id);
    const base = task ? task.timeSpent : 0;
    if (timerState.taskId === id && timerState.runningSince) {
      return base + (Date.now() - timerState.runningSince) / 1000;
    }
    return base;
  }

  function commitElapsed() {
    if (!timerState.taskId || !timerState.runningSince) return;
    const task = state.tasks.find(t => t.id === timerState.taskId);
    const elapsed = (Date.now() - timerState.runningSince) / 1000;
    if (task) {
      task.timeSpent += elapsed;
      saveTasks();
    }
    logTimeToday(elapsed);
    timerState.runningSince = null;
  }

  function handleTimerButtonClick(taskId) {
    if (timerState.taskId === taskId) {
      showTimerFloat();
      return;
    }
    startTimerFor(taskId);
  }

  function startTimerFor(taskId) {
    if (timerState.taskId && timerState.taskId !== taskId) {
      commitElapsed();
    }
    timerState.taskId = taskId;
    timerState.runningSince = Date.now();
    persistTimerState();
    showTimerFloat();
    startTimerTick();
    playSound('toggle');
    afterTaskMutationRerender();
  }

  function pauseTimer() {
    commitElapsed();
    persistTimerState();
    stopTimerTick();
    updateTimerFloatDisplay();
    updateTimerToggleIcon();
    afterTaskMutationRerender();
  }

  function resumeTimer() {
    if (!timerState.taskId) return;
    timerState.runningSince = Date.now();
    persistTimerState();
    startTimerTick();
    updateTimerToggleIcon();
    afterTaskMutationRerender();
  }

  function toggleTimerRunning() {
    if (timerState.runningSince) pauseTimer(); else resumeTimer();
  }

  function resetTimer() {
    const task = state.tasks.find(t => t.id === timerState.taskId);
    if (task) { task.timeSpent = 0; saveTasks(); }
    timerState.runningSince = timerState.taskId ? Date.now() : null;
    persistTimerState();
    updateTimerFloatDisplay();
    showToast('Timer reset');
    afterTaskMutationRerender();
  }

  function closeTimer() {
    commitElapsed();
    timerState.taskId = null;
    timerState.runningSince = null;
    persistTimerState();
    stopTimerTick();
    hideTimerFloat();
    afterTaskMutationRerender();
  }

  function startTimerTick() {
    stopTimerTick();
    updateTimerFloatDisplay();
    timerTickHandle = setInterval(updateTimerFloatDisplay, 1000);
  }
  function stopTimerTick() {
    if (timerTickHandle) { clearInterval(timerTickHandle); timerTickHandle = null; }
  }

  function showTimerFloat() {
    const task = state.tasks.find(t => t.id === timerState.taskId);
    if (!task) return;
    timerFloatTaskEl.textContent = task.name;
    updateTimerFloatDisplay();
    updateTimerToggleIcon();
    timerFloatEl.hidden = false;
    requestAnimationFrame(() => timerFloatEl.classList.add('visible'));
  }
  function hideTimerFloat() {
    timerFloatEl.classList.remove('visible');
    setTimeout(() => { timerFloatEl.hidden = true; }, prefersReducedMotion() ? 0 : 200);
  }
  function updateTimerFloatDisplay() {
    if (!timerState.taskId) return;
    timerFloatTimeEl.textContent = formatDuration(getElapsedSeconds());
  }
  function updateTimerToggleIcon() {
    timerToggleBtn.textContent = timerState.runningSince ? '⏸' : '▶';
    timerToggleBtn.setAttribute('aria-label', timerState.runningSince ? 'Pause timer' : 'Resume timer');
  }

  async function popOutTimer() {
    if (!('documentPictureInPicture' in window)) return;
    try {
      const pipWindow = await window.documentPictureInPicture.requestWindow({ width: 260, height: 150 });
      Array.from(document.styleSheets).forEach(sheet => {
        try {
          const rules = Array.from(sheet.cssRules).map(r => r.cssText).join('\n');
          const styleEl = pipWindow.document.createElement('style');
          styleEl.textContent = rules;
          pipWindow.document.head.appendChild(styleEl);
        } catch (e) { /* cross-origin stylesheet — skip */ }
      });
      pipWindow.document.documentElement.setAttribute('data-theme', state.theme);
      pipWindow.document.body.style.margin = '0';
      pipWindow.document.body.appendChild(timerFloatEl);
      timerFloatEl.classList.add('in-pip');
      pipWindow.addEventListener('pagehide', () => {
        document.body.appendChild(timerFloatEl);
        timerFloatEl.classList.remove('in-pip');
      }, { once: true });
    } catch (e) { /* request denied or unsupported at runtime — fail silently */ }
  }

  /* ---------- Focus mode (redesigned: full takeover) ---------- */
  let focusPickerOpen = false;

  function getFocusQueue() {
    return getWorkspaceTasks().filter(t => !t.completed).slice().sort(getSortComparator());
  }

  function toggleFocusMode() {
    state.focusMode = !state.focusMode;
    state.focusIndex = 0;
    focusPickerOpen = false;
    if (!state.focusMode && document.fullscreenElement) {
      document.exitFullscreen().catch(() => {});
    }
    render();
  }

  function updateFocusModeUI() {
    document.body.classList.toggle('focus-active', state.focusMode);
    focusToggleBtn.classList.toggle('active', state.focusMode);
    focusToggleBtn.setAttribute('aria-pressed', String(state.focusMode));
    focusToggleBtn.textContent = state.focusMode ? '✕ Exit focus' : '🎯 Focus';
  }

  function focusNext() {
    const queue = getFocusQueue();
    if (state.focusIndex < queue.length - 1) { state.focusIndex++; renderFocusCard(); }
  }
  function focusPrev() {
    if (state.focusIndex > 0) { state.focusIndex--; renderFocusCard(); }
  }

  function toggleAppFullscreen() {
    if (!document.fullscreenElement) {
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => { /* denied or unsupported */ });
      }
    } else if (document.exitFullscreen) {
      document.exitFullscreen().catch(() => {});
    }
  }

  function renderFocusWorkspaceMenu(container) {
    container.innerHTML = state.workspaces.map(w =>
      `<button type="button" class="sort-option focus-ws-option" data-name="${escapeHtml(w.name)}">${escapeHtml(w.name)}</button>`
    ).join('');
    container.querySelectorAll('.focus-ws-option').forEach(btn => {
      btn.addEventListener('click', () => {
        container.hidden = true;
        switchWorkspace(btn.dataset.name);
      });
    });
  }

  function renderFocusCard() {
    const queue = getFocusQueue();
    const wsBtnLabel = `🗂 ${state.currentWorkspace}`;

    const topbarHtml = `
      <div class="focus-topbar">
        <button type="button" class="btn-ghost" id="focus-exit-btn">✕ Exit focus</button>
        <div class="focus-ws-wrap">
          <button type="button" class="focus-ws-btn" id="focus-ws-btn" aria-haspopup="true" aria-expanded="false">${escapeHtml(wsBtnLabel)} <svg class="sort-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></button>
          <div class="sort-menu focus-ws-menu" id="focus-ws-menu" hidden></div>
        </div>
        <div class="focus-topbar-right">
          <button type="button" class="icon-btn tiny" id="focus-fullscreen-btn" aria-label="Toggle fullscreen" title="Fullscreen">⛶</button>
        </div>
      </div>
    `;

    if (queue.length === 0) {
      focusCardEl.innerHTML = topbarHtml + `
        <div class="focus-empty">🎉<p>Nothing pending in "${escapeHtml(state.currentWorkspace)}". Enjoy the break, or add something new.</p></div>
      `;
      wireFocusTopbar();
      return;
    }
    if (state.focusIndex > queue.length - 1) state.focusIndex = queue.length - 1;
    if (state.focusIndex < 0) state.focusIndex = 0;
    const task = queue[state.focusIndex];

    const countdown = countdownInfo(task.date);
    const dateHtml = (task.date && countdown)
      ? `<span class="meta-pill tone-${countdown.tone}">${escapeHtml(formatDateLong(task.date))} · ${escapeHtml(countdown.label)}</span>` : '';
    const priorityLabels = { high: 'High priority', medium: 'Medium priority', low: 'Low priority', 'no-priority': '' };
    const priorityHtml = priorityLabels[task.priority]
      ? `<span class="priority-flag priority-flag-${task.priority}">${priorityLabels[task.priority]}</span>` : '';
    const notesHtml = task.notes ? `<p class="focus-notes">${escapeHtml(task.notes)}</p>` : '';

    const subtasks = task.subtasks || [];
    const isTimerActive = timerState.taskId === task.id;
    const elapsed = isTimerActive ? getElapsedSeconds() : task.timeSpent;

    const pickerHtml = queue.map((t, i) => {
      const label = t.name.length > 26 ? t.name.slice(0, 26) + '…' : t.name;
      return `<button type="button" class="focus-chip priority-${t.priority}${i === state.focusIndex ? ' active' : ''}" data-index="${i}">${escapeHtml(label)}</button>`;
    }).join('');

    focusCardEl.innerHTML = topbarHtml + `
      <button type="button" class="focus-picker-toggle" id="focus-picker-toggle" aria-expanded="${focusPickerOpen}">
        <span class="chevron">›</span> ${queue.length} task${queue.length === 1 ? '' : 's'} queued
      </button>
      <div class="focus-picker ${focusPickerOpen ? 'open' : ''}" id="focus-picker">${pickerHtml}</div>
      <p class="focus-position">Task ${state.focusIndex + 1} of ${queue.length}</p>
      <div class="focus-name-row">
        <h2 class="focus-name">${escapeHtml(task.name)}</h2>
        <button type="button" class="icon-btn tiny" id="focus-edit-btn" aria-label="Edit task">✎</button>
      </div>
      <div class="focus-meta">${dateHtml}${priorityHtml}</div>
      ${notesHtml}
      <div class="focus-timer">
        <span class="focus-timer-time">${escapeHtml(formatDuration(elapsed))}</span>
        <button type="button" class="btn-ghost" id="focus-timer-toggle">${(isTimerActive && timerState.runningSince) ? 'Pause timer' : 'Start timer'}</button>
      </div>
      <div class="subtask-section open">
        <div class="subtask-list">${buildSubtaskRowsHtml(subtasks)}</div>
        <div class="subtask-add-row">
          <input type="text" class="subtask-add-input" placeholder="Add subtask" maxlength="140">
          <button type="button" class="subtask-add-btn" aria-label="Add subtask">+</button>
        </div>
      </div>
      <div class="focus-actions">
        <button type="button" class="icon-btn" id="focus-prev" aria-label="Previous task" ${state.focusIndex === 0 ? 'disabled' : ''}>‹</button>
        <button type="button" class="btn-primary focus-complete-btn">Mark complete</button>
        <button type="button" class="icon-btn" id="focus-next" aria-label="Next task" ${state.focusIndex >= queue.length - 1 ? 'disabled' : ''}>›</button>
      </div>
    `;

    wireFocusTopbar();
    focusCardEl.querySelector('.focus-complete-btn').addEventListener('click', () => toggleComplete(task.id));
    focusCardEl.querySelector('#focus-prev').addEventListener('click', focusPrev);
    focusCardEl.querySelector('#focus-next').addEventListener('click', focusNext);
    focusCardEl.querySelector('#focus-edit-btn').addEventListener('click', () => startEdit(task.id));
    focusCardEl.querySelector('#focus-timer-toggle').addEventListener('click', () => {
      if (isTimerActive) toggleTimerRunning(); else startTimerFor(task.id);
    });
    focusCardEl.querySelector('#focus-picker-toggle').addEventListener('click', () => {
      focusPickerOpen = !focusPickerOpen;
      renderFocusCard();
    });
    focusCardEl.querySelectorAll('.focus-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        state.focusIndex = Number(chip.dataset.index);
        renderFocusCard();
      });
    });
    wireSubtaskSection(focusCardEl, task.id);
  }

  function wireFocusTopbar() {
    focusCardEl.querySelector('#focus-exit-btn').addEventListener('click', toggleFocusMode);
    const wsBtn = focusCardEl.querySelector('#focus-ws-btn');
    const wsMenu = focusCardEl.querySelector('#focus-ws-menu');
    if (wsBtn && wsMenu) {
      renderFocusWorkspaceMenu(wsMenu);
      wsBtn.addEventListener('click', () => {
        const willOpen = wsMenu.hidden;
        wsMenu.hidden = !willOpen;
        wsBtn.setAttribute('aria-expanded', String(willOpen));
        if (willOpen) requestAnimationFrame(() => wsMenu.classList.add('open'));
        else wsMenu.classList.remove('open');
      });
    }
    const fsBtn = focusCardEl.querySelector('#focus-fullscreen-btn');
    if (fsBtn) fsBtn.addEventListener('click', toggleAppFullscreen);
  }

  /* ---------- Calendar / week view ---------- */
  function calendarChipHtml(t) {
    const label = t.name.length > 30 ? t.name.slice(0, 30) + '…' : t.name;
    return `
      <div class="cal-chip priority-${t.priority} ${t.completed ? 'is-complete' : ''}" data-id="${t.id}">
        <button type="button" class="cal-chip-check ${t.completed ? 'checked' : ''}" aria-label="Toggle complete"></button>
        <span class="cal-chip-name">${escapeHtml(label)}</span>
      </div>
    `;
  }

  function wireCalendarChips(container) {
    container.querySelectorAll('.cal-chip-check').forEach(btn => {
      btn.addEventListener('click', (e) => { e.stopPropagation(); toggleComplete(btn.closest('.cal-chip').dataset.id); });
    });
    container.querySelectorAll('.cal-chip').forEach(chip => {
      chip.addEventListener('click', () => startEdit(chip.dataset.id));
    });
  }

  function renderCalendarView() {
    const weekStart = parseLocalDate(state.calendarWeekStart) || startOfWeek(new Date());
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      days.push(d);
    }
    const fmt = (d) => d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    calRangeLabelEl.textContent = `${fmt(days[0])} – ${fmt(days[6])}`;

    const wsTasks = getWorkspaceTasks();
    const todayIso = toISODate(new Date());

    calendarGridEl.innerHTML = days.map(d => {
      const iso = toISODate(d);
      const dayTasks = wsTasks.filter(t => t.date === iso).sort(compareByPriority);
      const isToday = iso === todayIso;
      const chips = dayTasks.map(t => calendarChipHtml(t)).join('');
      return `
        <div class="cal-day ${isToday ? 'today' : ''}">
          <div class="cal-day-header">
            <span class="cal-day-name">${d.toLocaleDateString(undefined, { weekday: 'short' })}</span>
            <span class="cal-day-num">${d.getDate()}</span>
          </div>
          <div class="cal-day-tasks">${chips || '<p class="cal-day-empty">—</p>'}</div>
        </div>
      `;
    }).join('');
    wireCalendarChips(calendarGridEl);

    const unscheduled = wsTasks.filter(t => !t.date && !t.completed).sort(compareByPriority);
    calendarUnscheduledEl.innerHTML = unscheduled.length
      ? `<p class="settings-label">No due date</p><div class="cal-unscheduled-list">${unscheduled.map(t => calendarChipHtml(t)).join('')}</div>`
      : '';
    wireCalendarChips(calendarUnscheduledEl);
  }

  function shiftCalendarWeek(delta) {
    const d = parseLocalDate(state.calendarWeekStart) || startOfWeek(new Date());
    d.setDate(d.getDate() + delta * 7);
    state.calendarWeekStart = toISODate(d);
    renderCalendarView();
  }
  function goToCurrentWeek() {
    state.calendarWeekStart = toISODate(startOfWeek(new Date()));
    renderCalendarView();
  }

  /* ---------- Modal (returns a Promise) ---------- */
  function openModal({ title, message = '', withInput = false, inputValue = '', withSwatches = false, swatchValue = '', withChoices = null, confirmLabel = 'OK', danger = false }) {
    return new Promise(resolve => {
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      modalMessage.classList.toggle('hidden', !message);
      modalInput.classList.toggle('hidden', !withInput);
      modalInput.value = inputValue;
      modalSwatchesEl.classList.toggle('hidden', !withSwatches);
      modalSwatchesEl.innerHTML = '';
      modalChoicesEl.classList.toggle('hidden', !withChoices);
      modalChoicesEl.innerHTML = '';
      modalConfirmBtn.classList.toggle('hidden', !!withChoices);

      let chosenColor = swatchValue || PALETTE[0];
      if (withSwatches) {
        PALETTE.forEach(color => {
          const dot = document.createElement('button');
          dot.type = 'button';
          dot.className = 'swatch' + (color === chosenColor ? ' selected' : '');
          dot.style.background = color;
          dot.setAttribute('aria-label', 'Choose color');
          dot.addEventListener('click', () => {
            chosenColor = color;
            modalSwatchesEl.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            dot.classList.add('selected');
          });
          modalSwatchesEl.appendChild(dot);
        });
      }

      function cleanup(result) {
        modalBackdrop.classList.remove('visible');
        setTimeout(() => modalBackdrop.setAttribute('hidden', ''), prefersReducedMotion() ? 0 : 200);
        modalConfirmBtn.onclick = null;
        modalCancelBtn.onclick = null;
        modalInput.onkeydown = null;
        document.removeEventListener('keydown', onKeydown);
        resolve(result);
      }

      if (withChoices) {
        withChoices.forEach(choice => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'modal-choice';
          if (choice.color) btn.style.setProperty('--choice-color', choice.color);
          btn.innerHTML = (choice.color ? '<span class="choice-dot"></span>' : '') + escapeHtml(choice.label);
          btn.addEventListener('click', () => cleanup({ choice: choice.value }));
          modalChoicesEl.appendChild(btn);
        });
      }

      modalConfirmBtn.textContent = confirmLabel;
      modalConfirmBtn.classList.toggle('btn-danger', danger);
      modalConfirmBtn.classList.toggle('btn-primary', !danger);

      modalBackdrop.removeAttribute('hidden');
      requestAnimationFrame(() => modalBackdrop.classList.add('visible'));
      (withInput ? modalInput : (withChoices ? modalCancelBtn : modalConfirmBtn)).focus();
      if (withInput) modalInput.select();

      function onKeydown(e) { if (e.key === 'Escape') cleanup(null); }

      modalConfirmBtn.onclick = () => {
        if (withInput && !modalInput.value.trim()) { modalInput.focus(); return; }
        cleanup(withInput ? { value: modalInput.value.trim(), color: chosenColor } : true);
      };
      modalCancelBtn.onclick = () => cleanup(null);
      modalInput.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); modalConfirmBtn.click(); } };
      document.addEventListener('keydown', onKeydown);
    });
  }

  /* ---------- Toasts (with optional Undo action) ---------- */
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    toastContainer.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), prefersReducedMotion() ? 0 : TOAST_MS);
    }, 2400);
  }

  function showUndoToast(message, restoreFn) {
    if (pendingUndo) {
      clearTimeout(pendingUndo.timeoutId);
      if (pendingUndo.toastEl && pendingUndo.toastEl.parentNode) pendingUndo.toastEl.remove();
      pendingUndo = null;
    }
    const toast = document.createElement('div');
    toast.className = 'toast toast-undo';
    const msgSpan = document.createElement('span');
    msgSpan.textContent = message;
    const undoBtn = document.createElement('button');
    undoBtn.type = 'button';
    undoBtn.className = 'toast-undo-btn';
    undoBtn.textContent = 'Undo';
    toast.appendChild(msgSpan);
    toast.appendChild(undoBtn);
    toastContainer.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));

    let used = false;

    const timeoutId = setTimeout(() => {
      if (pendingUndo && pendingUndo.toastEl === toast) pendingUndo = null;
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), prefersReducedMotion() ? 0 : TOAST_MS);
    }, UNDO_WINDOW_MS);

    pendingUndo = { timeoutId, toastEl: toast };

    undoBtn.addEventListener('click', () => {
      if (used) return; // a stale, still-fading toast must never restore twice
      used = true;
      clearTimeout(timeoutId);
      if (pendingUndo && pendingUndo.toastEl === toast) pendingUndo = null;
      toast.classList.remove('show');
      undoBtn.disabled = true;
      setTimeout(() => toast.remove(), prefersReducedMotion() ? 0 : TOAST_MS);
      playSound('undo');
      restoreFn();
      showToast('Restored');
    });
  }

  /* ---------- Clock ---------- */
  function updateClock() {
    const now = new Date();
    dayOfWeekEl.textContent = `Today is ${now.toLocaleDateString(undefined, { weekday: 'long' })}`;
    dateTimeEl.textContent = now.toLocaleString(undefined, {
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      year: 'numeric', month: 'long', day: 'numeric'
    });
  }

  /* ---------- Event bindings ---------- */
  function bindEvents() {
    taskForm.addEventListener('submit', handleComposerSubmit);
    cancelEditBtn.addEventListener('click', cancelEdit);
    toggleDetailsBtn.addEventListener('click', toggleDetailsDrawer);

    detailsDrawer.querySelectorAll('[data-quick-date]').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.quickDate;
        if (action === 'today') taskDateInput.value = toISODate(new Date());
        else if (action === 'tomorrow') {
          const d = new Date();
          d.setDate(d.getDate() + 1);
          taskDateInput.value = toISODate(d);
        } else {
          taskDateInput.value = '';
        }
        taskDateInput.focus();
      });
    });

    segEl.querySelectorAll('.seg-btn').forEach(btn => {
      btn.addEventListener('click', () => setFilter(btn.dataset.filter));
    });

    clearAllBtn.addEventListener('click', handleClearAll);
    addWorkspaceBtn.addEventListener('click', handleAddWorkspace);
    editWorkspaceBtn.addEventListener('click', handleEditWorkspace);
    deleteWorkspaceBtn.addEventListener('click', handleDeleteWorkspace);
    settingsBtn.addEventListener('click', toggleSettingsPopover);
    soundToggleBtn.addEventListener('click', toggleSound);
    exportBtn.addEventListener('click', handleExport);
    importBtn.addEventListener('click', handleImportClick);
    importFileInput.addEventListener('change', handleImportFile);

    statsBtn.addEventListener('click', openStats);
    statsCloseBtn.addEventListener('click', closeStats);
    statsBackdrop.addEventListener('click', (e) => { if (e.target === statsBackdrop) closeStats(); });

    searchToggleBtn.addEventListener('click', toggleSearch);
    searchInput.addEventListener('input', () => {
      state.searchQuery = searchInput.value;
      if (state.viewMode !== 'calendar' && !state.focusMode) renderTaskList();
    });
    searchInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSearch(); });

    sortBtn.addEventListener('click', toggleSortMenu);
    focusToggleBtn.addEventListener('click', toggleFocusMode);

    viewToggleButtons.forEach(btn => {
      btn.addEventListener('click', () => setViewMode(btn.dataset.view));
    });
    calPrevBtn.addEventListener('click', () => shiftCalendarWeek(-1));
    calNextBtn.addEventListener('click', () => shiftCalendarWeek(1));
    calTodayBtn.addEventListener('click', goToCurrentWeek);

    timerToggleBtn.addEventListener('click', toggleTimerRunning);
    timerResetBtn.addEventListener('click', resetTimer);
    timerCloseBtn.addEventListener('click', closeTimer);
    timerPipBtn.addEventListener('click', popOutTimer);

    window.addEventListener('resize', () => updateFilterUI());

    document.addEventListener('click', (e) => {
      const wrap = focusCardEl.querySelector('.focus-ws-wrap');
      if (wrap && !wrap.contains(e.target)) {
        const menu = wrap.querySelector('.focus-ws-menu');
        if (menu) menu.hidden = true;
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && state.editingId && modalBackdrop.hasAttribute('hidden')) {
        cancelEdit();
      }
    });
  }

  init();
});

</script>
</body>
</html>
