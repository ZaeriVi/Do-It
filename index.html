/* =========================================================
   Do It — design tokens
   ========================================================= */
:root {
  --paper: #FBF6EA;
  --paper-2: #F3ECDB;
  --card: #FFFEFB;
  --ink: #2A2420;
  --muted: #787064;
  --line: rgba(42, 36, 32, 0.14);

  --accent: #3C5FE0;
  --accent-ink: #ffffff;
  --accent-2: #9C2B4E;
  --gold: #F2A93B;
  --success: #4F9270;
  --danger: #D14343;
  --danger-ink: #ffffff;
  --focus-ring: rgba(60, 95, 224, 0.28);
  --success-ring: rgba(79, 146, 112, 0.28);

  --hi-bg: #FBE1E6;   --hi-line: #E7A9B7;
  --med-bg: #FCEBC8;  --med-line: #E3BD79;
  --low-bg: #DEEFE1;  --low-line: #9CC9AA;
  --none-bg: #F1ECDF; --none-line: #D8CDB4;

  --shadow-sm: 0 1px 3px rgba(42, 36, 32, 0.10);
  --shadow-md: 0 8px 22px rgba(42, 36, 32, 0.12);
  --shadow-lg: 0 20px 46px rgba(42, 36, 32, 0.18);

  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;

  --font-display: 'Fredoka', 'Segoe UI', system-ui, sans-serif;
  --font-body: 'Inter', -apple-system, 'Segoe UI', sans-serif;
}

:root[data-theme="beige"] {

  --paper-2: #DDCFA8;
  --card: #F5EFE0;
  --ink: #2B1D14;
  --muted: #756046;

  --accent-ink: #ffffff;
  --accent-2: #A67C3D;

:root[data-theme="yellow"] {

  --paper-2: #FBEBB8;
  --card: #FFFFFF;
  --ink: #3D2E10;
  --muted: #7E6E3E;
  --line: rgba(61, 46, 16, 0.14);

  --accent: #D9A62E;
  --accent-ink: #3D2E10;

/* =========================================================
   Base
   ========================================================= */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: radial-gradient(circle at 15% -10%, var(--paper-2), var(--paper) 55%);
  color: var(--ink);
  font-family: var(--font-body);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: clamp(16px, 4vw, 40px) 16px 60px;
  transition: background-color .4s ease, color .4s ease;
}

.app-shell {
  width: 100%;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

button, input, select, textarea { font-family: inherit; }

/* =========================================================
   Header
   ========================================================= */
.app-header {
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  box-shadow: var(--shadow-md);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 16px;
  transition: background-color .4s ease, border-color .4s ease;
}
.brand { min-width: 0; }
.wordmark {
  font-family: var(--font-display);
  font-size: 2.1rem;
  font-weight: 700;
  margin: 0;
  letter-spacing: -0.01em;
  line-height: 1;
}
.wordmark-dot { color: var(--accent-2); transition: color .35s ease; }
.subline {
  margin: 6px 0 0;
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--muted);
  transition: color .35s ease;
}
.header-actions {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 10px;
  flex-shrink: 0;
}
.header-buttons { display: flex; gap: 8px; }
.clock {
  margin: 0;
  font-size: 0.82rem;
  color: var(--muted);
  text-align: right;
  white-space: nowrap;
  transition: color .35s ease;
}

.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 2px solid var(--ink);
  background: var(--card);
  color: var(--ink);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  transition: transform .15s ease, background-color .2s ease, border-color .2s ease, color .2s ease;
  flex-shrink: 0;
}
.icon-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.icon-btn:active { transform: translateY(0) scale(0.92); }
.icon-btn.small { width: 34px; height: 34px; font-size: 0.85rem; }
.icon-btn.tiny { width: 30px; height: 30px; font-size: 0.8rem; border-width: 1.5px; }
.icon-btn.danger:hover { background: var(--danger); color: var(--danger-ink); border-color: var(--danger); }
.icon-btn.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
.icon-btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.icon-btn:disabled:hover { background: var(--card); color: var(--ink); border-color: var(--ink); }
#stats-btn svg { width: 18px; height: 18px; display: block; }

/* ---- Settings popover (theme + sound + data) ---- */
.settings-wrap { position: relative; flex-shrink: 0; }
#settings-btn svg { width: 18px; height: 18px; display: block; }

.settings-popover {
  position: absolute;
  top: calc(100% + 10px);
  right: 0;
  width: 230px;
  max-width: calc(100vw - 56px);
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  padding: 14px;
  z-index: 60;
  opacity: 0;
  transform: scale(.94) translateY(-6px);
  transform-origin: top right;
  transition: opacity .18s ease, transform .18s ease, background-color .35s ease, border-color .35s ease;
}
.settings-popover[hidden] { display: none; }
.settings-popover.open { opacity: 1; transform: scale(1) translateY(0); }

.settings-label {
  margin: 0 0 8px;
  font-family: var(--font-display);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .03em;
}

.theme-swatches {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.theme-swatch {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  background: none;
  border: none;
  padding: 6px 2px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background-color .15s ease;
}
.theme-swatch:hover { background: var(--paper-2); }
.swatch-circle {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--line);
  background: linear-gradient(135deg, var(--sw-a) 50%, var(--sw-b) 50%);
  transition: border-color .15s ease, transform .15s ease;
}
.theme-swatch.selected .swatch-circle { border-color: var(--ink); transform: scale(1.08); }
.swatch-name { font-size: 0.7rem; color: var(--muted); }
.theme-swatch.selected .swatch-name { color: var(--ink); font-weight: 600; }

.settings-divider { height: 1px; background: var(--line); margin: 12px 0; }

.settings-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  background: none;
  border: none;
  padding: 4px 2px;
  cursor: pointer;
  color: var(--ink);
  font-size: 0.9rem;
  font-family: var(--font-body);
}
.settings-row-icon { font-size: 1rem; line-height: 1; }
.settings-row-label { flex: 1; text-align: left; }

.switch {
  width: 38px;
  height: 22px;
  border-radius: 999px;
  background: var(--line);
  position: relative;
  flex-shrink: 0;
  transition: background-color .25s ease;
}
.switch-knob {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: var(--card);
  box-shadow: var(--shadow-sm);
  transition: transform .25s cubic-bezier(.34, 1.56, .64, 1);
}
.settings-row.is-on .switch { background: var(--accent); }
.settings-row.is-on .switch-knob { transform: translateX(16px); }

.settings-data-actions { display: flex; gap: 8px; }
.data-btn { flex: 1; padding: 8px 10px; font-size: 0.82rem; text-align: center; justify-content: center; }

/* =========================================================
   Progress
   ========================================================= */
.progress-card {
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: var(--radius-md);
  padding: 14px 18px;
  box-shadow: var(--shadow-sm);
  transition: background-color .4s ease, border-color .4s ease;
}
.progress-bar-track {
  height: 14px;
  background: var(--paper-2);
  border: 1.5px solid var(--line);
  border-radius: 999px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--success), var(--accent));
  border-radius: 999px;
  transition: width .5s cubic-bezier(.22, .9, .3, 1);
}
.progress-label {
  margin: 8px 0 0;
  font-size: 0.85rem;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
  gap: 10px;
}
.progress-label #progress-percent {
  font-weight: 700;
  color: var(--ink);
  font-family: var(--font-display);
}

/* =========================================================
   Workspaces
   ========================================================= */
.workspace-bar {
  display: flex;
  gap: 10px;
  align-items: center;
}
.workspace-tabs {
  flex: 1;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 4px 2px;
  min-width: 0;
}
.workspace-tab {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 2px solid var(--line);
  background: var(--card);
  color: var(--muted);
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.92rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s ease;
}
.workspace-tab .tab-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: var(--tab-color, var(--accent));
  flex-shrink: 0;
}
.workspace-tab.active {
  border-color: var(--ink);
  color: var(--ink);
  background: var(--paper-2);
  box-shadow: var(--shadow-sm);
  transform: translateY(-2px);
}
.workspace-tab .tab-count {
  background: var(--tab-color, var(--accent));
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 999px;
}
.workspace-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* =========================================================
   Composer
   ========================================================= */
.composer {
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  box-shadow: var(--shadow-sm);
  transition: background-color .4s ease, border-color .4s ease;
}
.composer-main {
  display: flex;
  gap: 10px;
}
.composer input[type="text"],
.composer input[type="date"],
.composer select,
.composer textarea {
  border: 2px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 11px 13px;
  font-size: 0.95rem;
  background: var(--paper);
  color: var(--ink);
}
.composer-main input[type="text"] { flex: 1; min-width: 0; }
.composer input:focus, .composer select:focus, .composer textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--focus-ring);
}

.btn-primary {
  background: var(--accent);
  color: var(--accent-ink);
  border: 2px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 11px 20px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.98rem;
  cursor: pointer;
  transition: transform .15s ease, box-shadow .15s ease;
  white-space: nowrap;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
.btn-primary:active { transform: translateY(0) scale(.97); }

.btn-ghost {
  background: transparent;
  border: 2px solid var(--line);
  color: var(--muted);
  border-radius: var(--radius-sm);
  padding: 11px 16px;
  font-family: var(--font-display);
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

.btn-danger {
  background: var(--danger) !important;
  color: var(--danger-ink) !important;
  border-color: var(--danger) !important;
}

.btn-danger-outline {
  background: transparent;
  border: 2px solid var(--danger);
  color: var(--danger);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-family: var(--font-display);
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s ease;
}
.btn-danger-outline:hover:not(:disabled) { background: var(--danger); color: var(--danger-ink); }
.btn-danger-outline:disabled { opacity: .4; cursor: not-allowed; }

.details-toggle {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.85rem;
  padding: 10px 2px 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  text-align: left;
}
.details-toggle .chevron {
  display: inline-block;
  transition: transform .25s ease;
}
.details-toggle[aria-expanded="true"] .chevron { transform: rotate(90deg); }
.details-toggle .hint { opacity: .7; }
.details-toggle:hover { color: var(--ink); }

.details-drawer {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  visibility: hidden;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: max-height .32s ease, opacity .25s ease, visibility 0s linear .32s, margin-top .32s ease;
}
.details-drawer.open {
  max-height: 600px;
  opacity: 1;
  visibility: visible;
  margin-top: 12px;
  transition: max-height .32s ease, opacity .25s ease, visibility 0s linear 0s, margin-top .32s ease;
}
.date-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
.chip {
  border: 1.5px solid var(--line);
  background: var(--paper);
  color: var(--muted);
  border-radius: 999px;
  padding: 7px 12px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all .15s ease;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.select-row { display: flex; gap: 8px; }
.select-row select { flex: 1; min-width: 0; }
.details-drawer textarea { resize: vertical; min-height: 44px; }

/* =========================================================
   Toolbar: filter / search / sort / view / focus
   ========================================================= */
.toolbar { display: flex; flex-direction: column; gap: 10px; }
.toolbar-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

.segmented {
  position: relative;
  flex: 1 1 auto;
  min-width: 180px;
  display: flex;
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: 999px;
  padding: 4px;
  overflow-x: auto;
}
.seg-indicator {
  position: absolute;
  top: 4px;
  left: 0;
  height: calc(100% - 8px);
  background: var(--accent);
  border-radius: 999px;
  transition: transform .28s cubic-bezier(.22, .9, .3, 1), width .28s cubic-bezier(.22, .9, .3, 1);
  z-index: 0;
}
.seg-btn {
  position: relative;
  z-index: 1;
  flex: 1;
  background: none;
  border: none;
  padding: 9px 12px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.84rem;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  border-radius: 999px;
  transition: color .2s ease;
}
.seg-btn.active { color: var(--accent-ink); }

.view-segmented { flex: 0 0 auto; min-width: 0; }
.seg-btn-sm {
  background: none;
  border: none;
  padding: 8px 12px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.8rem;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  border-radius: 999px;
  transition: background-color .2s ease, color .2s ease;
}
.seg-btn-sm.active { background: var(--ink); color: var(--paper); }

.search-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.search-input {
  display: none;
  width: 160px;
  border: 2px solid var(--line);
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 0.85rem;
  background: var(--card);
  color: var(--ink);
}
.search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
.search-wrap.open .search-input { display: block; }

.sort-wrap { position: relative; flex-shrink: 0; }
.sort-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: 999px;
  padding: 9px 14px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.84rem;
  color: var(--ink);
  cursor: pointer;
  white-space: nowrap;
}
.sort-btn-label { opacity: .75; font-weight: 500; }
.sort-chevron { width: 14px; height: 14px; transition: transform .2s ease; }
.sort-btn[aria-expanded="true"] .sort-chevron { transform: rotate(180deg); }

.sort-menu {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  min-width: 170px;
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  padding: 6px;
  z-index: 60;
  opacity: 0;
  transform: scale(.94) translateY(-6px);
  transform-origin: top left;
  transition: opacity .16s ease, transform .16s ease;
}
.sort-menu[hidden] { display: none; }
.sort-menu.open { opacity: 1; transform: scale(1) translateY(0); }
.sort-option {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  padding: 9px 10px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 0.9rem;
  color: var(--ink);
  cursor: pointer;
}
.sort-option:hover { background: var(--paper-2); }
.sort-option.selected { background: var(--accent); color: var(--accent-ink); font-weight: 600; }

.focus-toggle-btn {
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: 999px;
  padding: 9px 14px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.84rem;
  color: var(--ink);
  cursor: pointer;
  white-space: nowrap;
  transition: background-color .2s ease, color .2s ease, border-color .2s ease;
}
.focus-toggle-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

/* =========================================================
   Task list
   ========================================================= */
.task-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
  min-height: 60px;
}
.task-list[hidden] { display: none; }
.task-list.empty { min-height: 120px; }
.empty-state {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--muted);
  font-size: 0.95rem;
  padding: 30px 20px;
  border: 2px dashed var(--line);
  border-radius: var(--radius-md);
  background: var(--card);
}

.task-card {
  --priority-bg: var(--none-bg);
  --priority-line: var(--none-line);
  position: relative;
  background: var(--priority-bg);
  border: 2px solid var(--ink);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  box-shadow: var(--shadow-sm);
  transition: transform .2s ease, box-shadow .2s ease, background-color .3s ease, border-color .3s ease, opacity .3s ease;
  overflow: hidden;
}
.task-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.task-card.priority-high { --priority-bg: var(--hi-bg); --priority-line: var(--hi-line); }
.task-card.priority-medium { --priority-bg: var(--med-bg); --priority-line: var(--med-line); }
.task-card.priority-low { --priority-bg: var(--low-bg); --priority-line: var(--low-line); }
.task-card.is-complete { opacity: .66; }
.task-card.is-complete .task-name { text-decoration: line-through; color: var(--muted); }
.task-card.flash-complete { animation: completeFlash .5s ease; }
.task-card.dragging { opacity: .4; }
.task-card.drop-target { box-shadow: 0 0 0 3px var(--accent); }

.task-main { display: flex; gap: 12px; flex: 1; min-width: 0; }

.checkbox {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border-radius: 8px;
  border: 2px solid var(--ink);
  background: var(--card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: transparent;
  margin-top: 2px;
  padding: 0;
  transition: background-color .2s ease, color .2s ease, border-color .2s ease;
}
.checkbox .check-icon { width: 15px; height: 15px; }
.checkbox.checked { background: var(--success); border-color: var(--success); color: #fff; animation: checkPop .32s ease; }
.checkbox:active { transform: scale(.85); }

.task-body { flex: 1; min-width: 0; }
.task-name {
  margin: 0;
  font-weight: 600;
  font-size: 1.02rem;
  word-break: break-word;
  transition: color .2s ease;
}
.task-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.meta-pill {
  font-size: 0.76rem;
  padding: 3px 9px;
  border-radius: 999px;
  background: var(--card);
  border: 1.5px solid var(--line);
  color: var(--muted);
  font-weight: 600;
}
.meta-pill.tone-overdue {
  color: var(--danger-ink);
  background: var(--danger);
  border-color: var(--danger);
  animation: pulseSoft 2.4s ease-in-out infinite;
}
.meta-pill.tone-today {
  color: var(--accent-ink);
  background: var(--accent);
  border-color: var(--accent);
}
.meta-pill.time-pill.running { animation: pulseSoft 2.4s ease-in-out infinite; border-color: var(--accent); color: var(--accent); }
.meta-pill.recurrence-pill { color: var(--accent-2); border-color: var(--accent-2); }
.priority-flag {
  font-size: 0.76rem;
  padding: 3px 9px;
  border-radius: 999px;
  font-weight: 700;
  border: 1.5px solid var(--priority-line);
  color: var(--ink);
  background: transparent;
}
.task-notes {
  margin: 8px 0 0;
  font-size: 0.85rem;
  color: var(--muted);
  white-space: pre-wrap;
  word-break: break-word;
}
.task-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; align-items: flex-start; }
.reorder-controls { display: flex; flex-direction: column; gap: 2px; }
.reorder-controls .icon-btn { width: 22px; height: 16px; font-size: 0.6rem; border-radius: 4px; }

/* ---- Subtasks ---- */
.subtask-section { display: none; }
.subtask-section.open {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
  animation: subtaskOpen .2s ease;
}
.subtask-list { display: flex; flex-direction: column; gap: 6px; }
.subtask-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 6px 8px;
}
.subtask-check {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  border-radius: 5px;
  border: 1.5px solid var(--ink);
  background: transparent;
  color: transparent;
  font-size: 0.65rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
  transition: background-color .15s ease, color .15s ease, border-color .15s ease;
}
.subtask-check.checked { background: var(--success); border-color: var(--success); color: #fff; }
.subtask-text {
  flex: 1;
  min-width: 0;
  font-size: 0.86rem;
  word-break: break-word;
  background: none;
  border: none;
  padding: 4px 2px;
  margin: 0;
  font-family: inherit;
  color: inherit;
  text-align: left;
  cursor: pointer;
  border-radius: 6px;
  transition: background-color .15s ease;
}
.subtask-text:hover { background: var(--paper-2); }
.subtask-text.done { text-decoration: line-through; color: var(--muted); }
.subtask-edit-input {
  flex: 1;
  min-width: 0;
  border: 1.5px solid var(--accent);
  border-radius: 6px;
  padding: 4px 6px;
  font-size: 0.86rem;
  font-family: inherit;
  background: var(--card);
  color: var(--ink);
}
.subtask-edit-input:focus { outline: none; box-shadow: 0 0 0 3px var(--focus-ring); }
.subtask-remove {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
}
.subtask-remove:hover { background: var(--danger); color: var(--danger-ink); }
.subtask-add-row { display: flex; gap: 6px; margin-top: 8px; }
.subtask-add-input {
  flex: 1;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  font-size: 0.85rem;
  background: var(--paper);
  color: var(--ink);
  min-width: 0;
}
.subtask-add-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
.subtask-add-btn {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--ink);
  background: var(--card);
  color: var(--ink);
  cursor: pointer;
  font-size: 1rem;
}
.subtask-add-btn:hover { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

/* =========================================================
   Focus mode (full takeover, folded workspace switcher)
   ========================================================= */
body.focus-active .composer,
body.focus-active .toolbar,
body.focus-active .task-list,
body.focus-active .calendar-view,
body.focus-active .progress-card,
body.focus-active .workspace-bar,
body.focus-active .app-header {
  display: none;
}
body.focus-active {
  background: radial-gradient(circle at 50% 10%, var(--card), var(--paper) 65%);
}
.focus-card { display: none; }
body.focus-active .focus-card {
  display: flex;
  flex-direction: column;
  gap: 16px;
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: var(--radius-lg);
  padding: 30px 28px;
  box-shadow: var(--shadow-lg);
  animation: focusIn .35s ease both;
  margin-top: clamp(10px, 8vh, 90px);
}
.focus-topbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
.focus-topbar-right { display: flex; gap: 6px; }
.focus-ws-wrap { position: relative; }
.focus-ws-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: 999px;
  padding: 8px 14px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 0.82rem;
  color: var(--ink);
  cursor: pointer;
}
.focus-ws-btn .sort-chevron { width: 12px; height: 12px; }
.focus-ws-menu { left: 50%; transform: translateX(-50%) scale(.94) translateY(-6px); }
.focus-ws-menu.open { transform: translateX(-50%) scale(1) translateY(0); }
body.no-fullscreen-api #focus-fullscreen-btn { display: none; }

.focus-picker-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  padding: 0;
  align-self: flex-start;
}
.focus-picker-toggle .chevron { display: inline-block; transition: transform .2s ease; }
.focus-picker-toggle[aria-expanded="true"] .chevron { transform: rotate(90deg); }
.focus-picker-toggle:hover { color: var(--ink); }

.focus-picker {
  display: none;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 4px;
}
.focus-picker.open { display: flex; animation: subtaskOpen .18s ease; }
.focus-chip {
  --priority-line: var(--none-line);
  flex-shrink: 0;
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  border: 1.5px solid var(--priority-line);
  background: var(--paper);
  color: var(--muted);
  border-radius: 999px;
  padding: 6px 12px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all .15s ease;
}
.focus-chip.priority-high { --priority-line: var(--hi-line); }
.focus-chip.priority-medium { --priority-line: var(--med-line); }
.focus-chip.priority-low { --priority-line: var(--low-line); }
.focus-chip:hover { color: var(--ink); }
.focus-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); font-weight: 600; }

.focus-position { margin: 0; font-size: 0.8rem; color: var(--muted); font-weight: 600; }
.focus-name-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.focus-name { margin: 0; font-family: var(--font-display); font-size: 1.9rem; line-height: 1.2; }
.focus-meta { display: flex; flex-wrap: wrap; gap: 8px; }
.focus-notes { margin: 0; color: var(--muted); font-size: 0.95rem; white-space: pre-wrap; }
.focus-timer {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-md);
  padding: 14px 18px;
}
.focus-timer-time { font-family: var(--font-display); font-size: 1.6rem; font-weight: 600; font-variant-numeric: tabular-nums; }
.focus-actions { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 4px; }
.focus-actions .btn-primary { flex: 1; max-width: 280px; padding-top: 14px; padding-bottom: 14px; font-size: 1.05rem; }
.focus-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  text-align: center;
  padding: 40px 10px;
  font-size: 2.4rem;
}
.focus-empty p { margin: 0; font-size: 0.95rem; color: var(--muted); font-family: var(--font-body); }

/* =========================================================
   Calendar / week view
   ========================================================= */
.calendar-view {
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow-sm);
}
.calendar-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.calendar-nav-center { display: flex; align-items: center; gap: 10px; }
.calendar-range { font-family: var(--font-display); font-weight: 600; font-size: 1.02rem; }
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
}
.cal-day {
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 8px;
  min-height: 90px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.cal-day.today { border-color: var(--accent); border-width: 2px; background: var(--paper-2); }
.cal-day-header { display: flex; justify-content: space-between; align-items: baseline; }
.cal-day-name { font-size: 0.7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
.cal-day-num { font-family: var(--font-display); font-weight: 700; font-size: 0.95rem; }
.cal-day.today .cal-day-num { color: var(--accent); }
.cal-day-tasks { display: flex; flex-direction: column; gap: 4px; }
.cal-day-empty { margin: 0; color: var(--line); font-size: 0.75rem; text-align: center; }
.cal-chip {
  --priority-line: var(--none-line);
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--card);
  border-left: 3px solid var(--priority-line);
  border-radius: 5px;
  padding: 3px 6px;
  cursor: pointer;
}
.cal-chip.priority-high { --priority-line: var(--hi-line); }
.cal-chip.priority-medium { --priority-line: var(--med-line); }
.cal-chip.priority-low { --priority-line: var(--low-line); }
.cal-chip.is-complete { opacity: .55; }
.cal-chip.is-complete .cal-chip-name { text-decoration: line-through; }
.cal-chip-check {
  flex-shrink: 0;
  width: 12px;
  height: 12px;
  border-radius: 3px;
  border: 1.5px solid var(--ink);
  background: transparent;
  padding: 0;
  cursor: pointer;
}
.cal-chip-check.checked { background: var(--success); border-color: var(--success); }
.cal-chip-name { font-size: 0.72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.calendar-unscheduled { margin-top: 14px; }
.cal-unscheduled-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.cal-unscheduled-list .cal-chip { border-left-width: 3px; padding: 5px 10px; }
.cal-unscheduled-list .cal-chip-name { font-size: 0.8rem; white-space: normal; }

/* =========================================================
   Stats panel
   ========================================================= */
.stats-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(20, 16, 10, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 900;
  opacity: 0;
  transition: opacity .2s ease;
}
.stats-backdrop[hidden] { display: none; }
.stats-backdrop.visible { opacity: 1; }
.stats-card {
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: var(--radius-lg);
  padding: 24px;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow-lg);
}
.stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.stats-header h2 { margin: 0; font-family: var(--font-display); font-size: 1.3rem; }
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.stat-tile {
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: var(--paper);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 14px;
}
.stat-value { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; }
.stat-label { font-size: 0.78rem; color: var(--muted); }

/* =========================================================
   Modal
   ========================================================= */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(20, 16, 10, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 1000;
  opacity: 0;
  transition: opacity .2s ease;
}
.modal-backdrop[hidden] { display: none; }
.modal-backdrop.visible { opacity: 1; }
.modal-card {
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: var(--radius-lg);
  padding: 24px;
  max-width: 380px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  transform: scale(.92) translateY(10px);
  transition: transform .22s cubic-bezier(.2, 1.4, .4, 1);
}
.modal-backdrop.visible .modal-card { transform: scale(1) translateY(0); }
.modal-title { margin: 0 0 8px; font-family: var(--font-display); font-size: 1.3rem; }
.modal-message { margin: 0 0 14px; color: var(--muted); font-size: 0.92rem; line-height: 1.45; }
.modal-input {
  width: 100%;
  border: 2px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 1rem;
  background: var(--paper);
  color: var(--ink);
  margin-bottom: 12px;
}
.modal-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }
.modal-swatches { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform .15s ease, border-color .15s ease;
  padding: 0;
}
.swatch.selected { border-color: var(--ink); transform: scale(1.15); }
.modal-choices { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; max-height: 240px; overflow-y: auto; }
.modal-choice {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: 2px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 0.95rem;
  cursor: pointer;
  text-align: left;
  transition: border-color .15s ease, background-color .15s ease;
}
.modal-choice:hover { border-color: var(--accent); background: var(--paper-2); }
.choice-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--choice-color, var(--accent)); flex-shrink: 0; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; }

/* =========================================================
   Toasts
   ========================================================= */
.toast-container {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 1100;
  align-items: center;
}
.toast {
  background: var(--ink);
  color: var(--paper);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 0.86rem;
  font-weight: 600;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity .22s ease, transform .22s ease;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast-undo {
  display: flex;
  align-items: center;
  gap: 12px;
  pointer-events: auto;
}
.toast-undo-btn {
  background: none;
  border: none;
  color: var(--gold);
  font-weight: 700;
  font-family: var(--font-display);
  font-size: 0.84rem;
  cursor: pointer;
  padding: 2px 4px;
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* =========================================================
   Floating timer widget
   ========================================================= */
.timer-float {
  position: fixed;
  bottom: 22px;
  right: 22px;
  z-index: 1200;
  background: var(--card);
  border: 2px solid var(--ink);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  padding: 12px 14px;
  min-width: 210px;
  opacity: 0;
  transform: translateY(16px) scale(.96);
  transition: opacity .2s ease, transform .2s ease, background-color .35s ease, border-color .35s ease;
}
.timer-float[hidden] { display: none; }
.timer-float.visible { opacity: 1; transform: translateY(0) scale(1); }
.timer-float.in-pip { position: static; box-shadow: none; width: 100%; min-width: 0; }
.timer-float-task {
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}
.timer-float-time {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  margin-bottom: 8px;
}
.timer-float-controls { display: flex; gap: 6px; }

/* =========================================================
   Utility
   ========================================================= */
.hidden { display: none !important; }

/* =========================================================
   Keyframes
   ========================================================= */
@keyframes taskEnter {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.task-card.enter { animation: taskEnter .38s ease both; }

@keyframes taskExit {
  to { opacity: 0; transform: scale(.9) translateY(-4px); }
}
.task-card.exit { animation: taskExit .26s ease forwards; pointer-events: none; }

@keyframes checkPop {
  0% { transform: scale(.7); }
  55% { transform: scale(1.18); }
  100% { transform: scale(1); }
}

@keyframes subtaskOpen {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes completeFlash {
  0% { box-shadow: 0 0 0 0 var(--success-ring); }
  40% { box-shadow: 0 0 0 8px var(--success-ring); }
  100% { box-shadow: 0 0 0 0 transparent; }
}

@keyframes celebratePulse {
  0% { box-shadow: 0 0 0 0 var(--success-ring); }
  50% { box-shadow: 0 0 0 10px var(--success-ring); transform: scale(1.015); }
  100% { box-shadow: 0 0 0 0 transparent; transform: scale(1); }
}
.progress-card.celebrate { animation: celebratePulse .7s ease; }

@keyframes pulseSoft {
  0%, 100% { box-shadow: 0 0 0 0 rgba(209, 67, 67, 0); }
  50% { box-shadow: 0 0 0 4px rgba(209, 67, 67, 0.18); }
}

@keyframes focusIn {
  from { opacity: 0; transform: translateY(10px) scale(.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* =========================================================
   Responsive
   ========================================================= */
@media (max-width: 560px) {
  .app-header { flex-direction: column; align-items: stretch; }
  .header-actions { flex-direction: row; align-items: center; justify-content: space-between; width: 100%; }
  .composer-main { flex-wrap: wrap; }
  .composer-main input[type="text"] { flex: 1 1 100%; }
  .select-row { flex-direction: column; }
  .toolbar-row { flex-wrap: wrap; }
  .segmented { flex: 1 1 100%; }
  .search-input { width: 140px; }

  .task-card { flex-direction: column; }
  .task-actions { align-self: flex-end; }
  .focus-actions { flex-wrap: wrap; }
  .focus-actions .btn-primary { order: -1; flex: 1 1 100%; max-width: none; }
  .timer-float { left: 16px; right: 16px; bottom: 16px; min-width: 0; }
  .calendar-grid { grid-template-columns: 1fr; }
  .cal-day { min-height: 0; flex-direction: row; align-items: center; }
  .cal-day-header { flex-direction: column; align-items: flex-start; flex-shrink: 0; width: 44px; }

  body.focus-active .focus-card { padding: 22px 18px; margin-top: 0; }

}

/* =========================================================

:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }

@media (prefers-reduced-motion: reduce) {

    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}

  /* ---------- State ---------- */
  const state = {
    tasks: [],
    workspaces: [],
    currentWorkspace: 'Default',
    filter: 'all',
    sort: 'date',
    searchQuery: '',
    editingId: null,
    theme: 'light',
    soundEnabled: true,

    focusIndex: 0,

  };

  const expandedSubtasks = new Set();

  let timerTickHandle = null;
  let pendingUndo = null; // { timeoutId }

  /* ---------- Utilities ---------- */
  function uid() {
    if (window.crypto && typeof crypto.randomUUID === 'function') return crypto.randomUUID();
    return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 9);
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function prefersReducedMotion() {
    return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  }

  function onceAnimationEndOrTimeout(node, ms, cb) {
    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      cb();
    };
    node.addEventListener('animationend', finish, { once: true });
    setTimeout(finish, ms);
  }

  /* ---------- Sound effects (synthesized — no audio files, no network) ---------- */
  let audioCtx = null;
  function getAudioCtx() {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    if (!audioCtx) audioCtx = new AC();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playTone(freq, startTime, duration, type, peakGain) {
    const ctx = getAudioCtx();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime + startTime);
    gain.gain.setValueAtTime(0, ctx.currentTime + startTime);
    gain.gain.linearRampToValueAtTime(peakGain, ctx.currentTime + startTime + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + startTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + startTime);
    osc.stop(ctx.currentTime + startTime + duration + 0.03);
  }

  const SOUND_RECIPES = {
    add: () => { playTone(520, 0, 0.10, 'sine', 0.16); playTone(760, 0.06, 0.12, 'sine', 0.14); },
    update: () => { playTone(700, 0, 0.08, 'sine', 0.10); },
    complete: () => { playTone(600, 0, 0.09, 'triangle', 0.15); playTone(900, 0.07, 0.16, 'triangle', 0.16); },
    uncheck: () => { playTone(480, 0, 0.10, 'sine', 0.11); },
    delete: () => { playTone(420, 0, 0.08, 'sine', 0.13); playTone(280, 0.05, 0.14, 'sine', 0.11); },
    error: () => { playTone(220, 0, 0.09, 'square', 0.07); playTone(190, 0.09, 0.12, 'square', 0.07); },
    celebrate: () => { playTone(523, 0, 0.10, 'triangle', 0.15); playTone(659, 0.09, 0.10, 'triangle', 0.15); playTone(784, 0.18, 0.22, 'triangle', 0.17); },
    toggle: () => { playTone(700, 0, 0.07, 'sine', 0.10); },
    undo: () => { playTone(500, 0, 0.07, 'sine', 0.12); playTone(650, 0.05, 0.09, 'sine', 0.12); }
  };

  function playSound(name) {
    if (!state.soundEnabled) return;
    const recipe = SOUND_RECIPES[name];
    if (!recipe) return;
    try { recipe(); } catch (e) { /* audio unavailable — fail silently */ }
  }

  function pad2(n) { return String(n).padStart(2, '0'); }

  function toISODate(d) {
    return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
  }

  function parseLocalDate(dateStr) {
    if (!dateStr) return null;
    const parts = dateStr.split('-').map(Number);
    if (parts.length !== 3 || parts.some(isNaN)) return null;
    return new Date(parts[0], parts[1] - 1, parts[2]);
  }

  function todayLocalMidnight() {
    const n = new Date();
    return new Date(n.getFullYear(), n.getMonth(), n.getDate());
  }

  function formatDateLong(dateStr) {
    const d = parseLocalDate(dateStr);
    if (!d) return '';
    const opts = { weekday: 'short', month: 'short', day: 'numeric' };
    if (d.getFullYear() !== new Date().getFullYear()) opts.year = 'numeric';
    return d.toLocaleDateString(undefined, opts);
  }

  function countdownInfo(dateStr) {
    if (!dateStr) return null;
    const due = parseLocalDate(dateStr);
    if (!due) return null;
    const diffDays = Math.round((due - todayLocalMidnight()) / 86400000);
    if (diffDays > 1) return { label: `${diffDays} days left`, tone: 'future' };
    if (diffDays === 1) return { label: 'Tomorrow', tone: 'future' };
    if (diffDays === 0) return { label: 'Due today', tone: 'today' };
    if (diffDays === -1) return { label: '1 day overdue', tone: 'overdue' };
    return { label: `${Math.abs(diffDays)} days overdue`, tone: 'overdue' };
  }

  function formatDuration(totalSeconds) {
    const s = Math.max(0, Math.floor(totalSeconds || 0));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${pad2(m)}:${pad2(sec)}`;
    return `${m}:${pad2(sec)}`;
  }

  function formatHoursMinutes(totalSeconds) {
    const s = Math.max(0, Math.floor(totalSeconds || 0));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    if (h === 0 && m === 0) return '0m';
    if (h === 0) return `${m}m`;
    if (m === 0) return `${h}h`;
    return `${h}h ${m}m`;
  }

  function advanceDate(dateStr, freq) {
    const d = parseLocalDate(dateStr);
    if (!d) return '';
    if (freq === 'daily') d.setDate(d.getDate() + 1);
    else if (freq === 'weekly') d.setDate(d.getDate() + 7);
    else if (freq === 'monthly') d.setMonth(d.getMonth() + 1);
    return toISODate(d);
  }

  function startOfWeek(date) {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const day = d.getDay(); // 0 = Sunday
    const diff = (day === 0 ? -6 : 1) - day; // shift to Monday
    d.setDate(d.getDate() + diff);
    return d;
  }

  /* ---------- Persistence ---------- */
  function loadTasks() {
    let raw = [];
    try { raw = JSON.parse(localStorage.getItem(STORAGE.TASKS)) || []; } catch (e) { raw = []; }
    if (!Array.isArray(raw)) raw = [];
    return raw.map((t, i) => ({
      id: t.id || uid(),
      name: t.name || '',
      date: t.date || '',
      notes: t.notes || '',
      completed: !!t.completed,
      priority: t.priority || 'no-priority',
      workspace: t.workspace || 'Default',
      createdAt: t.createdAt || (Date.now() - (raw.length - i) * 1000),
      subtasks: Array.isArray(t.subtasks)
        ? t.subtasks.map(s => ({ id: s.id || uid(), text: s.text || '', completed: !!s.completed }))
        : [],
      timeSpent: (typeof t.timeSpent === 'number' && t.timeSpent >= 0) ? t.timeSpent : 0,
      completedAt: t.completedAt || (t.completed ? (t.createdAt || Date.now()) : null),
      recurrence: RECURRENCES.includes(t.recurrence) ? t.recurrence : 'none',
      sortIndex: (typeof t.sortIndex === 'number') ? t.sortIndex : (t.createdAt || (Date.now() - (raw.length - i) * 1000))
    }));
  }

  function loadWorkspaces() {
    let raw = [];
    try { raw = JSON.parse(localStorage.getItem(STORAGE.WORKSPACES)) || []; } catch (e) { raw = []; }
    if (!Array.isArray(raw) || raw.length === 0) raw = [{ name: 'Default', color: PALETTE[0] }];
    return raw.map((w, i) => ({
      name: w.name,
      color: (w.color && w.color !== 'transparent') ? w.color : PALETTE[i % PALETTE.length]
    }));
  }

  function loadViewState() {
    let v = {};
    try { v = JSON.parse(localStorage.getItem(STORAGE.VIEW)) || {}; } catch (e) { v = {}; }
    return v;
  }

  function loadTimerState() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE.TIMER));
      if (raw && raw.taskId) return raw;
    } catch (e) { /* ignore */ }
    return null;
  }

  function loadTimeLog() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE.TIMELOG));
      if (Array.isArray(raw)) return raw.filter(e => e && e.date && typeof e.seconds === 'number');
    } catch (e) { /* ignore */ }
    return [];
  }

  function saveTasks() { localStorage.setItem(STORAGE.TASKS, JSON.stringify(state.tasks)); }
  function saveWorkspaces() { localStorage.setItem(STORAGE.WORKSPACES, JSON.stringify(state.workspaces)); }
  function saveTimeLog() { localStorage.setItem(STORAGE.TIMELOG, JSON.stringify(state.timeLog)); }
  function persistUiState() {
    localStorage.setItem(STORAGE.VIEW, JSON.stringify({
      currentWorkspace: state.currentWorkspace,
      filter: state.filter,
      sort: state.sort,
      theme: state.theme,
      soundEnabled: state.soundEnabled
    }));
  }
  function persistTimerState() {
    if (timerState.taskId) {
      localStorage.setItem(STORAGE.TIMER, JSON.stringify(timerState));
    } else {
      localStorage.removeItem(STORAGE.TIMER);
    }
  }

  function logTimeToday(seconds) {
    if (seconds <= 0) return;
    const today = toISODate(new Date());
    let entry = state.timeLog.find(e => e.date === today);
    if (!entry) { entry = { date: today, seconds: 0 }; state.timeLog.push(entry); }
    entry.seconds += seconds;
    const cutoff = Date.now() - 120 * 86400000;
    state.timeLog = state.timeLog.filter(e => {
      const d = parseLocalDate(e.date);
      return !d || d.getTime() >= cutoff;
    });
    saveTimeLog();
  }

  /* ---------- Init / load ---------- */
  function init() {
    state.tasks = loadTasks();
    state.workspaces = loadWorkspaces();
    state.timeLog = loadTimeLog();
    saveTasks();
    saveWorkspaces();

    const view = loadViewState();
    state.currentWorkspace = (view.currentWorkspace && state.workspaces.some(w => w.name === view.currentWorkspace))
      ? view.currentWorkspace
      : state.workspaces[0].name;
    state.filter = FILTERS.includes(view.filter) ? view.filter : 'all';
    state.sort = SORTS.includes(view.sort) ? view.sort : 'date';
    if (THEMES.some(t => t.id === view.theme)) {
      state.theme = view.theme;
    } else {
      state.theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
    }
    state.soundEnabled = typeof view.soundEnabled === 'boolean' ? view.soundEnabled : true;
    state.calendarWeekStart = toISODate(startOfWeek(new Date()));

    const savedTimer = loadTimerState();
    if (savedTimer && state.tasks.some(t => t.id === savedTimer.taskId)) {
      timerState.taskId = savedTimer.taskId;
      timerState.runningSince = savedTimer.runningSince || null;
    }

    applyTheme();
    renderThemeSwatches();
    updateSoundUI();
    renderSortMenu();
    updateSortButtonLabel();
    bindEvents();
    render();
    updateClock();
    setInterval(updateClock, 1000);

    if (timerState.taskId) {
      showTimerFloat();
      startTimerTick();
    }
    if (!('documentPictureInPicture' in window)) {
      timerPipBtn.classList.add('hidden');
    }
    if (!(document.fullscreenEnabled || document.documentElement.requestFullscreen)) {
      document.body.classList.add('no-fullscreen-api');
    }
  }

  /* ---------- Rendering ---------- */
  function render() {
    renderWorkspaceTabs();
    if (state.focusMode) {
      renderFocusCard();
    } else if (state.viewMode === 'calendar') {
      renderCalendarView();
    } else {
      renderTaskList();
    }
    updateProgress();
    updateFilterUI();
    updateSortButtonLabel();
    const count = getWorkspaceTasks().length;
    clearAllBtn.disabled = count === 0;
    deleteWorkspaceBtn.disabled = state.workspaces.length <= 1;
    updateFocusModeUI();
    updateViewModeUI();
  }

  function renderWorkspaceTabs() {
    workspacesContainer.innerHTML = '';
    state.workspaces.forEach(ws => {
      const pending = state.tasks.filter(t => t.workspace === ws.name && !t.completed).length;
      const tab = document.createElement('button');
      tab.type = 'button';
      tab.className = 'workspace-tab' + (ws.name === state.currentWorkspace ? ' active' : '');
      tab.style.setProperty('--tab-color', ws.color);
      tab.setAttribute('aria-pressed', String(ws.name === state.currentWorkspace));
      tab.innerHTML = `<span class="tab-dot"></span><span class="tab-label">${escapeHtml(ws.name)}</span>` +
        (pending ? `<span class="tab-count">${pending}</span>` : '');
      tab.addEventListener('click', () => switchWorkspace(ws.name));
      workspacesContainer.appendChild(tab);
    });
  }

  function getWorkspaceTasks() {
    return state.tasks.filter(t => t.workspace === state.currentWorkspace);
  }

  function compareByDate(a, b) {
    if (!a.date && !b.date) return a.createdAt - b.createdAt;
    if (!a.date) return 1;
    if (!b.date) return -1;
    return a.date.localeCompare(b.date);
  }

  function compareByPriority(a, b) {
    if (PRIORITY_ORDER[a.priority] !== PRIORITY_ORDER[b.priority]) {
      return PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
    }
    return compareByDate(a, b);
  }

  function getSortComparator() {
    switch (state.sort) {
      case 'alpha': return (a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
      case 'added': return (a, b) => a.createdAt - b.createdAt;
      case 'priority': return compareByPriority;
      case 'custom': return (a, b) => a.sortIndex - b.sortIndex;
      case 'date':
      default: return compareByDate;
    }
  }

  function matchesSearch(task) {
    const q = state.searchQuery.trim().toLowerCase();
    if (!q) return true;
    if (task.name.toLowerCase().includes(q)) return true;
    if (task.notes && task.notes.toLowerCase().includes(q)) return true;
    if ((task.subtasks || []).some(s => s.text.toLowerCase().includes(q))) return true;
    return false;
  }

  function getFilteredSortedTasks() {
    let list = getWorkspaceTasks();
    if (state.filter === 'pending') list = list.filter(t => !t.completed);
    else if (state.filter === 'completed') list = list.filter(t => t.completed);
    if (state.searchQuery.trim()) list = list.filter(matchesSearch);
    return list.slice().sort(getSortComparator());
  }

  function emptyStateMessage() {
    if (state.searchQuery.trim()) return `No tasks match "${state.searchQuery.trim()}".`;
    switch (state.filter) {
      case 'pending': return 'Nothing pending. Nice.';
      case 'completed': return 'Nothing completed yet.';
      default: return 'Nothing here yet — add your first task above.';
    }
  }

  function renderTaskList() {
    const list = getFilteredSortedTasks();
    taskListEl.innerHTML = '';
    if (list.length === 0) {
      taskListEl.classList.add('empty');
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.textContent = emptyStateMessage();
      taskListEl.appendChild(empty);
      return;
    }
    taskListEl.classList.remove('empty');
    const isCustom = state.sort === 'custom';
    list.forEach((task, i) => {
      const card = buildTaskCard(task, { reorderable: isCustom, list, index: i });
      card.classList.add('enter');
      card.style.animationDelay = `${Math.min(i, 10) * 40}ms`;
      taskListEl.appendChild(card);
    });
  }

  function buildSubtaskRowsHtml(subtasks) {
    return subtasks.map(s => `
      <div class="subtask-row" data-subtask-id="${s.id}">
        <button type="button" class="subtask-check ${s.completed ? 'checked' : ''}" aria-label="${s.completed ? 'Mark subtask incomplete' : 'Mark subtask complete'}">✓</button>
        <button type="button" class="subtask-text ${s.completed ? 'done' : ''}" aria-label="Edit subtask text">${escapeHtml(s.text)}</button>
        <button type="button" class="subtask-remove" aria-label="Remove subtask">×</button>
      </div>
    `).join('');
  }

  function wireSubtaskSection(scopeEl, taskId) {
    scopeEl.querySelectorAll('.subtask-check').forEach(btn => {
      btn.addEventListener('click', () => toggleSubtask(taskId, btn.closest('.subtask-row').dataset.subtaskId));
    });
    scopeEl.querySelectorAll('.subtask-remove').forEach(btn => {
      btn.addEventListener('click', () => removeSubtask(taskId, btn.closest('.subtask-row').dataset.subtaskId));
    });
    scopeEl.querySelectorAll('.subtask-text').forEach(btn => {
      btn.addEventListener('click', () => startEditSubtask(btn, taskId, btn.closest('.subtask-row').dataset.subtaskId));
    });
    const addInput = scopeEl.querySelector('.subtask-add-input');
    const addBtn = scopeEl.querySelector('.subtask-add-btn');
    if (!addInput || !addBtn) return;
    function commitAdd() {
      const text = addInput.value.trim();
      if (!text) return;
      addSubtask(taskId, text);
    }
    addBtn.addEventListener('click', commitAdd);
    addInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); commitAdd(); } });
  }

  function startEditSubtask(button, taskId, subtaskId) {
    const task = state.tasks.find(t => t.id === taskId);
    const sub = task && (task.subtasks || []).find(s => s.id === subtaskId);
    if (!sub) return;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'subtask-edit-input';
    input.maxLength = 140;
    input.value = sub.text;
    button.replaceWith(input);
    input.focus();
    input.select();

    let settled = false;
    function commit() {
      if (settled) return;
      settled = true;
      const val = input.value.trim();
      if (val && val !== sub.text) {
        sub.text = val;
        saveTasks();
      }
      afterTaskMutationRerender();
    }
    function cancelEdit() {
      if (settled) return;
      settled = true;
      afterTaskMutationRerender();
    }
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      else if (e.key === 'Escape') { e.preventDefault(); input.removeEventListener('blur', commit); cancelEdit(); }
    });
  }

  function buildTaskCard(task, opts) {
    opts = opts || {};
    const wrapper = document.createElement('div');
    wrapper.className = 'task-card priority-' + task.priority + (task.completed ? ' is-complete' : '');
    wrapper.dataset.id = task.id;

    const countdown = countdownInfo(task.date);
    const dateChipHtml = (task.date && countdown)
      ? `<span class="meta-pill tone-${countdown.tone}">${escapeHtml(formatDateLong(task.date))} · ${escapeHtml(countdown.label)}</span>`
      : '';
    const notesHtml = task.notes ? `<p class="task-notes">${escapeHtml(task.notes)}</p>` : '';
    const priorityLabels = { high: 'High', medium: 'Medium', low: 'Low', 'no-priority': '' };
    const priorityLabel = priorityLabels[task.priority] || '';
    const priorityHtml = priorityLabel
      ? `<span class="priority-flag priority-flag-${task.priority}">${priorityLabel}</span>`
      : '';
    const recurrenceHtml = (task.recurrence && task.recurrence !== 'none')
      ? `<span class="meta-pill recurrence-pill">🔁 ${escapeHtml(RECURRENCE_LABELS[task.recurrence] || '')}</span>`
      : '';

    const subtasks = task.subtasks || [];
    const subDone = subtasks.filter(s => s.completed).length;
    const subtaskPillHtml = subtasks.length > 0
      ? `<span class="meta-pill subtask-pill">☑ ${subDone}/${subtasks.length}</span>`
      : '';

    const isTimerActive = timerState.taskId === task.id;
    const displaySeconds = isTimerActive ? getElapsedSeconds() : task.timeSpent;
    const timeTrackedHtml = (displaySeconds > 0)
      ? `<span class="meta-pill time-pill ${(isTimerActive && timerState.runningSince) ? 'running' : ''}">⏱ ${escapeHtml(formatDuration(displaySeconds))}</span>`
      : '';

    const isOpen = expandedSubtasks.has(task.id);
    const reorderHtml = opts.reorderable ? `
      <div class="reorder-controls">
        <button type="button" class="icon-btn tiny move-up-btn" aria-label="Move up" ${opts.index === 0 ? 'disabled' : ''}>▲</button>
        <button type="button" class="icon-btn tiny move-down-btn" aria-label="Move down" ${opts.index >= (opts.list.length - 1) ? 'disabled' : ''}>▼</button>
      </div>` : '';

    wrapper.innerHTML = `
      <div class="task-main">
        <button type="button" class="checkbox ${task.completed ? 'checked' : ''}" role="checkbox" aria-checked="${task.completed}" aria-label="${task.completed ? 'Mark incomplete' : 'Mark complete'}">
          <svg viewBox="0 0 24 24" class="check-icon" aria-hidden="true"><path d="M4 12.5L9.5 18L20 6" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="task-body">
          <p class="task-name">${escapeHtml(task.name)}</p>
          <div class="task-meta">${dateChipHtml}${priorityHtml}${recurrenceHtml}${subtaskPillHtml}${timeTrackedHtml}</div>
          ${notesHtml}
          <div class="subtask-section ${isOpen ? 'open' : ''}">
            <div class="subtask-list">${buildSubtaskRowsHtml(subtasks)}</div>
            <div class="subtask-add-row">
              <input type="text" class="subtask-add-input" placeholder="Add subtask" maxlength="140">
              <button type="button" class="subtask-add-btn" aria-label="Add subtask">+</button>
            </div>
          </div>
        </div>
      </div>
      <div class="task-actions">
        ${reorderHtml}
        <button type="button" class="icon-btn tiny subtask-toggle-btn" aria-label="Toggle subtasks" title="Subtasks">☑</button>
        <button type="button" class="icon-btn tiny timer-btn${isTimerActive ? ' active' : ''}" aria-label="Task timer" title="Timer">⏱</button>
        <button type="button" class="icon-btn tiny move-btn" aria-label="Move to workspace" title="Move to workspace">⇄</button>
        <button type="button" class="icon-btn tiny edit-btn" aria-label="Edit task">✎</button>
        <button type="button" class="icon-btn tiny danger delete-btn" aria-label="Delete task">🗑</button>
      </div>
    `;

    wrapper.querySelector('.checkbox').addEventListener('click', () => toggleComplete(task.id));
    wrapper.querySelector('.edit-btn').addEventListener('click', () => startEdit(task.id));
    wrapper.querySelector('.delete-btn').addEventListener('click', () => deleteTask(task.id));
    wrapper.querySelector('.move-btn').addEventListener('click', () => handleMoveTask(task.id));
    wrapper.querySelector('.timer-btn').addEventListener('click', () => handleTimerButtonClick(task.id));
    wrapper.querySelector('.subtask-toggle-btn').addEventListener('click', () => toggleSubtaskSection(task.id, wrapper));
    wireSubtaskSection(wrapper, task.id);

    if (opts.reorderable) {
      const upBtn = wrapper.querySelector('.move-up-btn');
      const downBtn = wrapper.querySelector('.move-down-btn');
      if (upBtn) upBtn.addEventListener('click', () => reorderTaskByStep(task.id, -1));
      if (downBtn) downBtn.addEventListener('click', () => reorderTaskByStep(task.id, 1));

      wrapper.draggable = true;
      wrapper.addEventListener('dragstart', (e) => {
        wrapper.classList.add('dragging');
        e.dataTransfer.setData('text/plain', task.id);
        e.dataTransfer.effectAllowed = 'move';
      });
      wrapper.addEventListener('dragend', () => wrapper.classList.remove('dragging'));
      wrapper.addEventListener('dragover', (e) => { e.preventDefault(); wrapper.classList.add('drop-target'); });
      wrapper.addEventListener('dragleave', () => wrapper.classList.remove('drop-target'));
      wrapper.addEventListener('drop', (e) => {
        e.preventDefault();
        wrapper.classList.remove('drop-target');
        const draggedId = e.dataTransfer.getData('text/plain');
        if (draggedId && draggedId !== task.id) reorderTaskBeside(draggedId, task.id);
      });
    }

    return wrapper;
  }

  function toggleSubtaskSection(taskId, wrapper) {
    const section = wrapper.querySelector('.subtask-section');
    const isOpen = section.classList.toggle('open');
    if (isOpen) expandedSubtasks.add(taskId); else expandedSubtasks.delete(taskId);
    if (isOpen) {
      const input = section.querySelector('.subtask-add-input');
      if (input) input.focus();
    }
  }

  function isVisibleUnderCurrentFilter(task) {
    if (state.filter === 'pending') return !task.completed;
    if (state.filter === 'completed') return task.completed;
    return true;
  }

  function afterTaskMutationRerender() {
    if (state.focusMode) renderFocusCard();
    else if (state.viewMode === 'calendar') renderCalendarView();
    else renderTaskList();
  }

  /* ---------- Subtasks ---------- */
  function addSubtask(taskId, text) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    if (!Array.isArray(task.subtasks)) task.subtasks = [];
    task.subtasks.push({ id: uid(), text, completed: false });
    saveTasks();
    playSound('add');
    afterTaskMutationRerender();
    const scope = state.focusMode ? focusCardEl : taskListEl.querySelector(`[data-id="${taskId}"]`);
    const input = scope && scope.querySelector('.subtask-add-input');
    if (input) input.focus();
  }

  function toggleSubtask(taskId, subtaskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    const sub = (task.subtasks || []).find(s => s.id === subtaskId);
    if (!sub) return;
    sub.completed = !sub.completed;
    saveTasks();
    playSound('toggle');
    afterTaskMutationRerender();
  }

  function removeSubtask(taskId, subtaskId) {
    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    task.subtasks = (task.subtasks || []).filter(s => s.id !== subtaskId);
    saveTasks();
    afterTaskMutationRerender();
  }

  /* ---------- Reordering (custom sort) ---------- */
  function reorderTaskByStep(taskId, direction) {
    const list = getFilteredSortedTasks();
    const idx = list.findIndex(t => t.id === taskId);
    const swapIdx = idx + direction;
    if (idx === -1 || swapIdx < 0 || swapIdx >= list.length) return;
    const a = list[idx], b = list[swapIdx];
    const tmp = a.sortIndex;
    a.sortIndex = b.sortIndex;
    b.sortIndex = tmp;
    saveTasks();
    renderTaskList();
  }

  function reorderTaskBeside(draggedId, targetId) {
    const list = getFilteredSortedTasks();
    const from = list.findIndex(t => t.id === draggedId);
    const to = list.findIndex(t => t.id === targetId);
    if (from === -1 || to === -1) return;
    const [moved] = list.splice(from, 1);
    list.splice(to, 0, moved);
    list.forEach((t, i) => { t.sortIndex = i; });
    saveTasks();
    renderTaskList();
  }

  /* ---------- Progress ---------- */
  function updateProgress() {
    const list = getWorkspaceTasks();
    const total = list.length;
    const done = list.filter(t => t.completed).length;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);
    progressFillEl.style.width = pct + '%';
    progressPercentEl.textContent = pct + '%';
    progressFractionEl.textContent = total === 0 ? 'No tasks yet' : `${done} of ${total} done`;
    return pct;
  }

  function updateFilterUI() {
    const buttons = Array.from(segEl.querySelectorAll('.seg-btn'));
    buttons.forEach(b => {
      const active = b.dataset.filter === state.filter;
      b.classList.toggle('active', active);
      b.setAttribute('aria-pressed', String(active));

    const activeBtn = buttons.find(b => b.dataset.filter === state.filter);

      segIndicator.style.width = activeBtn.offsetWidth + 'px';
      segIndicator.style.transform = `translateX(${activeBtn.offsetLeft}px)`;
    }
  }

  function setSort(s) {

    if (s === 'custom') {

      const list = getFilteredSortedTasks();

  /* ---------- Recurrence ---------- */
  function spawnNextRecurrence(task) {
    const nextDate = task.date ? advanceDate(task.date, task.recurrence) : '';
    state.tasks.push({
      id: uid(),
      name: task.name,
      date: nextDate,
      notes: task.notes,
      completed: false,
      priority: task.priority,
      workspace: task.workspace,
      createdAt: Date.now(),
      subtasks: (task.subtasks || []).map(s => ({ id: uid(), text: s.text, completed: false })),
      timeSpent: 0,
      completedAt: null,
      recurrence: task.recurrence,
      sortIndex: Date.now()
    });
    saveTasks();
    showToast('Next occurrence added');

  /* ---------- Task actions ---------- */
  function toggleComplete(id) {
    const task = state.tasks.find(t => t.id === id);
    if (!task) return;

    task.completed = !task.completed;
    task.completedAt = task.completed ? Date.now() : null;
    let recurrenceSpawned = false;
    if (task.completed && task.recurrence && task.recurrence !== 'none') {
      spawnNextRecurrence(task);
      recurrenceSpawned = true;
    }
    saveTasks();
    const pct = updateProgress();
    renderWorkspaceTabs();

    if (task.completed) {
      playSound('complete');
      if (pct === 100) celebrate();
    } else {
      playSound('uncheck');
    }

    if (state.focusMode) {
      renderFocusCard();
      return;
    }
    if (state.viewMode === 'calendar') {
      renderCalendarView();
      return;
    }
    if (recurrenceSpawned) {
      // a new task was just added to the list -- the in-place update path below
      // only patches the clicked card, so a full re-render is needed to show it
      renderTaskList();
      return;
    }

    const card = taskListEl.querySelector(`[data-id="${id}"]`);
    const stillVisible = isVisibleUnderCurrentFilter(task) && matchesSearch(task);

    if (card && stillVisible && state.sort !== 'custom') {
      card.classList.toggle('is-complete', task.completed);
      const checkbox = card.querySelector('.checkbox');
      checkbox.classList.toggle('checked', task.completed);
      checkbox.setAttribute('aria-checked', String(task.completed));
      checkbox.setAttribute('aria-label', task.completed ? 'Mark incomplete' : 'Mark complete');
      if (task.completed) {
        card.classList.remove('flash-complete');
        void card.offsetWidth;
        card.classList.add('flash-complete');
      }
    } else if (card) {
      card.classList.add('exit');
      onceAnimationEndOrTimeout(card, prefersReducedMotion() ? 10 : 260, renderTaskList);
    } else {
      renderTaskList();
    }
  }

  function celebrate() {
    playSound('celebrate');
    const card = document.querySelector('.progress-card');
    if (card) {
      card.classList.remove('celebrate');
      void card.offsetWidth;
      card.classList.add('celebrate');
    }
  }

  function clearTimerIfTaskMissing() {
    if (timerState.taskId && !state.tasks.some(t => t.id === timerState.taskId)) {
      timerState.taskId = null;
      timerState.runningSince = null;
      persistTimerState();
      stopTimerTick();
      hideTimerFloat();
    }
  }

  function deleteTask(id) {
    const task = state.tasks.find(t => t.id === id);
    if (!task) return;
    if (timerState.taskId === id) {
      timerState.taskId = null;
      timerState.runningSince = null;
      persistTimerState();
      stopTimerTick();
      hideTimerFloat();
    }
    const card = taskListEl.querySelector(`[data-id="${id}"]`);
    const finish = () => {
      state.tasks = state.tasks.filter(t => t.id !== id);
      saveTasks();
      if (state.editingId === id) cancelEdit();
      render();
      playSound('delete');
      showUndoToast('Task deleted', () => {
        state.tasks.push(task);
        saveTasks();
        render();
      });
    };
    if (card && !state.focusMode) {
      card.classList.add('exit');
      onceAnimationEndOrTimeout(card, prefersReducedMotion() ? 10 : 260, finish);
    } else {
      finish();
    }
  }

  function startEdit(id) {
    const task = state.tasks.find(t => t.id === id);
    if (!task) return;
    if (state.focusMode) { state.focusMode = false; render(); }
    state.editingId = id;
    taskNameInput.value = task.name;
    taskDateInput.value = task.date || '';
    taskPriorityInput.value = task.priority;
    taskNotesInput.value = task.notes || '';

    if (task.date || task.notes || task.priority !== 'no-priority' || (task.recurrence && task.recurrence !== 'none')) openDetailsDrawer();
    submitBtn.textContent = 'Save changes';
    cancelEditBtn.classList.remove('hidden');

      composerEl.scrollIntoView({ behavior: prefersReducedMotion() ? 'auto' : 'smooth', block: 'center' });

  function cancelEdit() {
    state.editingId = null;

  function resetComposerForm() {

  function handleComposerSubmit(e) {
    e.preventDefault();
    const name = taskNameInput.value.trim();
    if (!name) { taskNameInput.focus(); return; }
    const date = taskDateInput.value;
    const priority = taskPriorityInput.value;
    const notes = taskNotesInput.value.trim();
    const recurrence = RECURRENCES.includes(taskRecurrenceInput.value) ? taskRecurrenceInput.value : 'none';

    if (state.editingId) {
      const task = state.tasks.find(t => t.id === state.editingId);
      if (task) {
        task.name = name;
        task.date = date;
        task.priority = priority;
        task.notes = notes;
        task.recurrence = recurrence;
      }
      state.editingId = null;
      saveTasks();
      resetComposerForm();
      render();
      playSound('update');
      showToast('Task updated');
    } else {
      state.tasks.push({
        id: uid(), name, date, notes, completed: false, priority,
        workspace: state.currentWorkspace, createdAt: Date.now(),
        subtasks: [], timeSpent: 0, completedAt: null, recurrence,
        sortIndex: Date.now()
      });
      saveTasks();
      resetComposerForm();
      render();
      playSound('add');
      showToast('Task added');
    }
  }

    const task = state.tasks.find(t => t.id === taskId);
    if (!task) return;
    const others = state.workspaces.filter(w => w.name !== task.workspace);
    if (others.length === 0) {
      playSound('error');
      showToast('No other workspaces to move to');
      return;
    }
    const result = await openModal({
      title: 'Move to workspace',
      withChoices: others.map(w => ({ label: w.name, value: w.name, color: w.color }))
    });

    task.workspace = result.choice;
    saveTasks();
    render();

    const removed = getWorkspaceTasks();
    if (!removed.length) return;
    const count = removed.length;
    const ok = await openModal({
      title: 'Clear all tasks?',
      message: `This removes all ${count} task${count === 1 ? '' : 's'} in "${state.currentWorkspace}". This can't be undone.`,
      confirmLabel: 'Clear all',
      danger: true
    });
    if (!ok) return;
    state.tasks = state.tasks.filter(t => t.workspace !== state.currentWorkspace);
    saveTasks();

  /* ---------- Workspaces ---------- */
  function switchWorkspace(name) {
    if (name === state.currentWorkspace) return;
    state.currentWorkspace = name;

    persistUiState();
    if (state.editingId) cancelEdit();

  async function handleAddWorkspace() {
    const result = await openModal({
      title: 'New workspace', withInput: true, withSwatches: true, confirmLabel: 'Create'
    });
    if (!result) return;
    const name = result.value;
    if (!name) return;
    if (state.workspaces.some(w => w.name.toLowerCase() === name.toLowerCase())) {
      playSound('error');
      showToast(`"${name}" already exists`);
      return;
    }
    state.workspaces.push({ name, color: result.color });
    saveWorkspaces();
    switchWorkspace(name);
    playSound('add');
    showToast('Workspace created');
  }

  async function handleEditWorkspace() {
    const current = state.workspaces.find(w => w.name === state.currentWorkspace);
    if (!current) return;
    const result = await openModal({
      title: 'Rename workspace', withInput: true, inputValue: current.name,
      withSwatches: true, swatchValue: current.color, confirmLabel: 'Save'
    });
    if (!result) return;
    const newName = result.value;
    if (!newName) return;
    if (newName.toLowerCase() !== current.name.toLowerCase() &&
        state.workspaces.some(w => w.name.toLowerCase() === newName.toLowerCase())) {
      playSound('error');
      showToast(`"${newName}" already exists`);
      return;
    }
    const oldName = current.name;
    current.name = newName;
    current.color = result.color;
    state.tasks.forEach(t => { if (t.workspace === oldName) t.workspace = newName; });
    if (state.currentWorkspace === oldName) state.currentWorkspace = newName;
    saveWorkspaces();
    saveTasks();
    persistUiState();
    render();
    playSound('update');
    showToast('Workspace updated');
  }

  async function handleDeleteWorkspace() {
    if (state.workspaces.length <= 1) {
      playSound('error');
      showToast('You need at least one workspace');
      return;
    }
    const ok = await openModal({
      title: 'Delete workspace?',
      message: `This deletes "${state.currentWorkspace}" and all its tasks. This can't be undone.`,
      confirmLabel: 'Delete',
      danger: true
    });
    if (!ok) return;
    const deletedName = state.currentWorkspace;
    const deletedWorkspace = state.workspaces.find(w => w.name === deletedName);
    const deletedTasks = state.tasks.filter(t => t.workspace === deletedName);
    state.workspaces = state.workspaces.filter(w => w.name !== deletedName);
    state.tasks = state.tasks.filter(t => t.workspace !== deletedName);
    state.currentWorkspace = state.workspaces[0].name;
    saveWorkspaces();
    saveTasks();
    clearTimerIfTaskMissing();
    persistUiState();
    render();
    playSound('delete');
    showUndoToast('Workspace deleted', () => {
      state.workspaces.push(deletedWorkspace);
      state.tasks = state.tasks.concat(deletedTasks);
      saveWorkspaces();
      saveTasks();
      switchWorkspace(deletedName);
    });
  }
